name: Buscar Jogos

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Buscar jogos da API
        run: |
          HOJE=$(date -u +%Y-%m-%d)
          FIM=$(date -u -d "+10 days" +%Y-%m-%d)
          curl -s "https://api.football-data.org/v4/competitions/BSA/matches?dateFrom=$HOJE&dateTo=$FIM" \
            -H "X-Auth-Token: ea7017ad5fee423aba954573c238e31c" \
            -o jogos-data.json
      - name: Commitar se houver mudancas
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add jogos-data.json
          git diff --cached --quiet || git commit -m "Atualiza jogos-data.json [automated]"
          git push
